<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1e1f2a"/>
  <!-- LF monogram -->
  <g stroke="#c4b5fd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- L: vertical + foot -->
    <path d="M6 6 v10 h6"/>
    <!-- diagonal bridge: L foot → F top -->
    <line x1="12" y1="16" x2="17" y2="6"/>
    <!-- F: vertical -->
    <line x1="17" y1="6" x2="17" y2="26"/>
    <!-- F: top bar -->
    <line x1="17" y1="6" x2="26" y2="6"/>
    <!-- F: middle bar -->
    <line x1="17" y1="14" x2="24" y2="14"/>
  </g>
</svg>
